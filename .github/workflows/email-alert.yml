name: Email Notification

on:
  workflow_call:
    inputs:
      ci_status:
        required: true
        type: string
      infra_status:
        required: true
        type: string
      deploy_status:
        required: true
        type: string

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Set Final Status
        id: final
        run: |
          if [[ "${{ inputs.ci_status }}" == "success" && \
                "${{ inputs.infra_status }}" == "success" && \
                "${{ inputs.deploy_status }}" == "success" ]]; then
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: |
            ${{ steps.final.outputs.status == 'SUCCESS' && '✅' || '❌' }} CI/CD Pipeline ${{ steps.final.outputs.status }} - ${{ github.repository }}

          to: ${{ secrets.EMAIL_IDS }}
          from: ${{ secrets.EMAIL_USERNAME }}

          html_body: |
            <h2>🚀 CI/CD Pipeline Notification</h2>

            <p>
              <strong>📊 Pipeline Status:</strong>
              ${{ steps.final.outputs.status == 'SUCCESS' && '<span style="color:green;"><b>✅ SUCCESS</b></span>' || '<span style="color:red;"><b>❌ FAILED</b></span>' }}
            </p>

            <p><strong>📦 Repository:</strong> ${{ github.repository }}</p>
            <p><strong>🌿 Branch:</strong> ${{ github.ref }}</p>
            <p><strong>👤 Triggered By:</strong> ${{ github.actor }}</p>

            <p><strong>📝 Commit Message:</strong><br/>${{ github.event.head_commit.message }}</p>
            <p><strong>🔑 Commit SHA:</strong> ${{ github.sha }}</p>

            <h3>🔍 Job Results</h3>
            <table border="1" cellpadding="8" cellspacing="0" style="border-collapse: collapse;">
              <tr>
                <th>Stage</th>
                <th>Status</th>
              </tr>

              <tr>
                <td><b>🏗️ CI (Build & Scan)</b></td>
                <td>
                  ${{ inputs.ci_status == 'success' && '<span style="color:green;"><b>SUCCESS</b></span>' ||
                      inputs.ci_status == 'skipped' && '<span style="color:gray;"><b>SKIPPED</b></span>' ||
                      '<span style="color:red;"><b>FAILED</b></span>' }}
                </td>
              </tr>

              <tr>
                <td><b>🏗️ Infra (Terraform)</b></td>
                <td>
                  ${{ inputs.infra_status == 'success' && '<span style="color:green;"><b>SUCCESS</b></span>' ||
                      inputs.infra_status == 'skipped' && '<span style="color:gray;"><b>SKIPPED</b></span>' ||
                      '<span style="color:red;"><b>FAILED</b></span>' }}
                </td>
              </tr>

              <tr>
                <td><b>🚀 Deployment (AKS)</b></td>
                <td>
                  ${{ inputs.deploy_status == 'success' && '<span style="color:green;"><b>SUCCESS</b></span>' ||
                      inputs.deploy_status == 'skipped' && '<span style="color:gray;"><b>SKIPPED</b></span>' ||
                      '<span style="color:red;"><b>FAILED</b></span>' }}
                </td>
              </tr>

            </table>

            <br/>

            <p>
              <strong>🔗 Pipeline Link:</strong><br/>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
                View Full Pipeline
              </a>
            </p>

            <p><strong>⏱️ Run ID:</strong> ${{ github.run_id }}</p>